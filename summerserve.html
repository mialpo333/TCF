<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCF Summer Serve – Anmeldung</title>
<style>
  :root{
    --navy:#0a2a5e;
    --navy-deep:#061a3d;
    --yellow:#ffc20e;
    --yellow-soft:#ffd757;
    --blue-team:#1c7bd6;
    --ink:#0c1733;
    --paper:#f3f5f9;
    --line:rgba(255,255,255,.14);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{
    font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif;
    background:var(--navy-deep);
    color:#fff;
    line-height:1.5;
    min-height:100vh;
  }
  .wrap{max-width:520px;margin:0 auto;min-height:100vh;
    background:
      radial-gradient(120% 80% at 80% -10%, rgba(255,194,14,.18), transparent 55%),
      linear-gradient(180deg,var(--navy) 0%, var(--navy-deep) 100%);
    box-shadow:0 0 60px rgba(0,0,0,.4);
    overflow:hidden;
  }

  /* ---- HERO ---- */
  .hero{position:relative;padding:24px 20px 22px;text-align:center;
    border-bottom:3px solid var(--yellow)}
  .badge{display:inline-block;background:var(--yellow);color:var(--navy-deep);
    font-weight:800;font-size:11px;letter-spacing:1.5px;
    padding:5px 12px;border-radius:20px;transform:rotate(-2deg);margin-bottom:14px}
  .wordmark{display:block;width:100%;max-width:340px;height:auto;margin:0 auto 14px}
  .meta{display:flex;justify-content:center;gap:18px;flex-wrap:wrap;
    font-size:13px;color:rgba(255,255,255,.85)}
  .meta b{color:#fff}
  .countdown{margin-top:16px;font-size:12px;letter-spacing:.5px;
    color:var(--yellow-soft);font-weight:700}

  /* ---- LIVE BAR ---- */
  .live{display:flex;gap:10px;padding:18px 24px 4px}
  .tcard{flex:1;border-radius:14px;padding:14px 12px;text-align:center;
    position:relative;overflow:hidden}
  .tcard.blue{background:linear-gradient(160deg,#1c7bd6,#0e4f93)}
  .tcard.yellow{background:linear-gradient(160deg,#ffce3a,#f0a800);color:var(--navy-deep)}
  .tcard .lbl{font-size:11px;letter-spacing:1.5px;font-weight:800;opacity:.9}
  .tcard .num{font-size:30px;font-weight:900;line-height:1.1}
  .tcard .sub{font-size:10px;opacity:.8}
  .nextpill{margin:14px 24px 0;text-align:center;font-size:12px;
    color:rgba(255,255,255,.7)}
  .nextpill b{color:var(--yellow)}

  /* ---- FORM ---- */
  form{padding:20px 24px 30px}
  .field{margin-bottom:16px}
  label{display:block;font-size:12px;font-weight:700;letter-spacing:.5px;
    margin-bottom:6px;color:rgba(255,255,255,.9)}
  label .opt{font-weight:400;color:rgba(255,255,255,.45)}
  input,select{width:100%;padding:13px 14px;border-radius:11px;border:1.5px solid var(--line);
    background:rgba(255,255,255,.06);color:#fff;font-size:16px;font-family:inherit;
    transition:border-color .15s,background .15s}
  input::placeholder{color:rgba(255,255,255,.4)}
  input:focus,select:focus{outline:none;border-color:var(--yellow);
    background:rgba(255,255,255,.1)}
  select option{background:var(--navy-deep)}
  .row{display:flex;gap:12px}
  .row .field{flex:1}

  .steppers{display:flex;gap:12px}
  .stepper{flex:1}
  .stepbox{display:flex;align-items:center;border:1.5px solid var(--line);
    border-radius:11px;overflow:hidden;background:rgba(255,255,255,.06)}
  .stepbox button{flex:0 0 44px;height:48px;border:none;background:transparent;
    color:var(--yellow);font-size:22px;font-weight:900;cursor:pointer}
  .stepbox button:active{background:rgba(255,194,14,.15)}
  .stepbox span{flex:1;text-align:center;font-size:18px;font-weight:800}

  .hint{font-size:11px;color:rgba(255,255,255,.5);margin-top:5px}

  .contact-last{margin-top:6px;opacity:.85}
  .contact-last input{background:rgba(255,255,255,.04)}

  .blocklbl{font-size:12px;font-weight:800;letter-spacing:1.5px;text-transform:uppercase;
    color:var(--yellow);margin:6px 0 9px;padding-left:2px}
  .blocklbl:not(:first-child){margin-top:16px}

  /* person rows */
  .person{background:rgba(255,255,255,.05);border:1.5px solid var(--line);
    border-radius:13px;padding:12px;margin-bottom:11px;animation:slidein .25s ease}
  @keyframes slidein{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  .person .pnum{font-size:11px;font-weight:800;letter-spacing:1px;color:var(--yellow-soft);
    margin-bottom:8px;text-transform:uppercase}
  .person input{margin-bottom:9px}
  .person select{margin:0}

  /* team mode */
  .modes{display:flex;gap:10px}
  .mode{flex:1;padding:14px 10px;border-radius:13px;border:1.5px solid var(--line);
    background:rgba(255,255,255,.05);color:#fff;cursor:pointer;font-family:inherit;
    text-align:center;line-height:1.3}
  .mode b{display:block;font-size:14px;margin-bottom:3px}
  .mode span{font-size:11px;color:rgba(255,255,255,.6)}
  .mode.active{background:rgba(255,194,14,.16);border-color:var(--yellow)}
  .mode.active b{color:var(--yellow)}

  .submit{width:100%;margin-top:8px;padding:16px;border:none;border-radius:13px;
    background:var(--yellow);color:var(--navy-deep);font-size:17px;font-weight:900;
    letter-spacing:.5px;cursor:pointer;text-transform:uppercase;
    box-shadow:0 6px 0 #c79100;transition:transform .08s,box-shadow .08s}
  .submit:active{transform:translateY(4px);box-shadow:0 2px 0 #c79100}
  .submit:disabled{opacity:.55;cursor:not-allowed}

  .foot{text-align:center;font-size:11px;color:rgba(255,255,255,.45);
    padding:0 24px 26px;line-height:1.6}
  .foot a{color:var(--yellow-soft)}

  /* ---- SUCCESS ---- */
  .done{display:none;padding:50px 28px;text-align:center}
  .done.show{display:block;animation:pop .4s ease}
  @keyframes pop{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
  .done .ring{width:96px;height:96px;border-radius:50%;margin:0 auto 20px;
    display:flex;align-items:center;justify-content:center;font-size:46px;font-weight:900}
  .done.blue .ring{background:linear-gradient(160deg,#1c7bd6,#0e4f93)}
  .done.yellow .ring{background:linear-gradient(160deg,#ffce3a,#f0a800);color:var(--navy-deep)}
  .done.mixed .ring{background:linear-gradient(135deg,#1c7bd6 0 50%,#f0a800 50% 100%)}
  .done h2{font-size:24px;font-weight:900;margin-bottom:14px;text-transform:uppercase}
  .dperson{display:flex;justify-content:space-between;align-items:center;
    background:rgba(255,255,255,.06);border-radius:10px;padding:10px 14px;margin-bottom:7px}
  .dperson span:first-child{font-weight:700;font-size:15px}
  .dteam{font-size:12px;font-weight:800;padding:3px 11px;border-radius:20px}
  .dteam.blue{background:var(--blue-team);color:#fff}
  .dteam.yellow{background:var(--yellow);color:var(--navy-deep)}
  #doneTeam{margin-bottom:6px}
  .done p{color:rgba(255,255,255,.8);font-size:14px;margin-bottom:6px}
  .done .again{margin-top:24px;background:transparent;border:1.5px solid var(--line);
    color:#fff;padding:12px 22px;border-radius:11px;font-weight:700;cursor:pointer;font-size:14px}

  .err{display:none;background:rgba(220,60,60,.15);border:1px solid rgba(220,60,60,.5);
    color:#ffb3b3;padding:11px 14px;border-radius:10px;font-size:13px;margin-bottom:14px}
  .err.show{display:block}
</style>
</head>

        <label>Kinder</label>
        <div class="stepbox">
          <button type="button" data-step="kids" data-dir="-1">–</button>
          <span id="kids">0</span>
          <button type="button" data-step="kids" data-dir="1">+</button>
        </div>
      </div>
    </div>

    <div id="people"></div>

    <div class="field">
      <label>Team-Einteilung</label>
      <div class="modes">
        <button type="button" class="mode active" data-mode="together">
          <b>Alle in ein Team</b><span>Die Gruppe bleibt zusammen</span>
        </button>
        <button type="button" class="mode" data-mode="mix">
          <b>Überrascht uns!</b><span>Zufällig auf Blue & Yellow verteilt</span>
        </button>
      </div>
    </div>

    <div class="field contact-last">
      <label for="contact">Kontakt <span class="opt">(optional, nur für Rückfragen)</span></label>
      <input id="contact" name="contact" type="text" placeholder="E-Mail oder Telefon">
    </div>

    <button type="submit" class="submit" id="submitBtn">Jetzt anmelden</button>
  </form>

  <div class="foot">
    Anmeldeschluss: <b>10.07.2026</b><br>
    Fragen? <a href="mailto:sommerfest@tc-freiberg.de">sommerfest@tc-freiberg.de</a>
  </div>

  <!-- SUCCESS -->
  <section class="done" id="doneScreen">
    <div class="ring" id="doneRing">✓</div>
    <h2>Ihr seid dabei!</h2>
    <div id="doneTeam"></div>
    <p id="doneMsg"></p>
    <button class="again" id="againBtn">Weitere Anmeldung</button>
  </section>

</div>

<script>
/* =========================================================
   CONFIG — paste your deployed Apps Script Web App URL here.
   Until then the app runs in DEMO mode (counts kept locally).
   ========================================================= */
const API_URL = "https://script.google.com/macros/s/AKfycbydmpSMC-9Hxf5gRUD7mnK-NabsLOWr0vhN3se3XrWvBELaQaoQ87Rdjova7eYqvnpa/exec";
const DEMO = API_URL === "";

const EVENT_DATE = new Date("2026-07-25T15:00:00");
const DEADLINE   = new Date("2026-07-10T23:59:59");

let counts = { blue: 0, yellow: 0 };

/* ---- adults / kids steppers + dynamic person rows ---- */
const ADULT_MEALS = ["Fleisch","Vegetarisch"];
const KID_MEALS   = ["Fleisch","Vegetarisch","Kinderportion"];
const counts_ppl = { adults: 1, kids: 0 };
const adults = []; // {name, meal}
const kids = [];   // {name, meal}

function rowHTML(block, idx, label, meals){
  const opts = meals.map(m=>`<option value="${m}">${m}</option>`).join("");
  return `<div class="person" data-block="${block}" data-i="${idx}">
    <div class="pnum">${label}</div>
    <input type="text" class="p-name" placeholder="Name" autocomplete="off">
    <select class="p-meal">${opts}</select>
  </div>`;
}

function syncArrays(){
  while(adults.length < counts_ppl.adults) adults.push({name:"",meal:"Fleisch"});
  while(adults.length > counts_ppl.adults) adults.pop();
  while(kids.length < counts_ppl.kids) kids.push({name:"",meal:"Fleisch"});
  while(kids.length > counts_ppl.kids) kids.pop();
}

function wireRow(row, arr, i, meals){
  const p=arr[i];
  const nameEl=row.querySelector('.p-name');
  nameEl.value=p.name;
  nameEl.addEventListener('input',()=>{ p.name=nameEl.value; });
  const mealEl=row.querySelector('.p-meal');
  if(!meals.includes(p.meal)) p.meal=meals[0];
  mealEl.value=p.meal;
  mealEl.addEventListener('change',()=>{ p.meal=mealEl.value; });
}

function renderPeople(){
  syncArrays();
  const box=document.getElementById('people');
  let html="";
  if(counts_ppl.adults>0){
    html+=`<div class="blocklbl">Erwachsene</div>`;
    for(let i=0;i<counts_ppl.adults;i++)
      html+=rowHTML('adult',i,`Erwachsener ${i+1}`,ADULT_MEALS);
  }
  if(counts_ppl.kids>0){
    html+=`<div class="blocklbl">Kinder</div>`;
    for(let i=0;i<counts_ppl.kids;i++)
      html+=rowHTML('kid',i,`Kind ${i+1}`,KID_MEALS);
  }
  box.innerHTML=html;
  box.querySelectorAll('.person[data-block="adult"]').forEach((row,i)=>wireRow(row,adults,i,ADULT_MEALS));
  box.querySelectorAll('.person[data-block="kid"]').forEach((row,i)=>wireRow(row,kids,i,KID_MEALS));
}

document.querySelectorAll('[data-step]').forEach(b=>{
  b.addEventListener('click',()=>{
    const k=b.dataset.step, dir=+b.dataset.dir;
    const min = k==='adults'?1:0;
    counts_ppl[k]=Math.max(min, Math.min(20, counts_ppl[k]+dir));
    document.getElementById(k).textContent=counts_ppl[k];
    renderPeople();
  });
});
renderPeople();

/* ---- team mode ---- */
let mode="together";
document.querySelectorAll('.mode').forEach(b=>{
  b.addEventListener('click',()=>{
    mode=b.dataset.mode;
    document.querySelectorAll('.mode').forEach(m=>m.classList.toggle('active', m===b));
  });
});

/* ---- countdown ---- */
function tickCountdown(){
  const el=document.getElementById('countdown');
  const now=new Date();
  if(now>DEADLINE){ el.textContent="Anmeldeschluss vorbei – melde dich am Clubhaus."; return; }
  const days=Math.ceil((DEADLINE-now)/86400000);
  el.textContent = `Noch ${days} Tag${days===1?'':'e'} bis zum Anmeldeschluss`;
}
tickCountdown();

/* ---- predicted next team (smaller one) ---- */
function predictedTeam(){
  if(counts.blue < counts.yellow) return 'blue';
  if(counts.yellow < counts.blue) return 'yellow';
  return null; // tie -> backend decides
}
function renderCounts(){
  document.getElementById('cntBlue').textContent = counts.blue;
  document.getElementById('cntYellow').textContent = counts.yellow;
  const p=predictedTeam();
  const pill=document.getElementById('nextpill');
  if(p==='blue') pill.innerHTML='Aktuell käme die nächste Anmeldung zu <b>Team Blue</b>.';
  else if(p==='yellow') pill.innerHTML='Aktuell käme die nächste Anmeldung zu <b>Team Yellow</b>.';
  else pill.innerHTML='Gleichstand – das nächste Team wird automatisch zugeteilt.';
}

/* ---- load live counts ---- */
async function loadCounts(){
  if(DEMO){
    counts = JSON.parse(localStorage.getItem('tcf_counts')||'{"blue":0,"yellow":0}');
    renderCounts(); return;
  }
  try{
    const r=await fetch(API_URL+'?action=counts');
    const d=await r.json();
    counts={blue:d.blue||0, yellow:d.yellow||0};
  }catch(e){ /* keep zeros, still usable */ }
  renderCounts();
}
loadCounts();

/* ---- submit ---- */
const form=document.getElementById('regForm');
const btn=document.getElementById('submitBtn');
const errBox=document.getElementById('errBox');

function showErr(m){ errBox.textContent=m; errBox.classList.add('show'); }
function clearErr(){ errBox.classList.remove('show'); }

form.addEventListener('submit', async (e)=>{
  e.preventDefault();
  clearErr();

  // pull latest names from both blocks
  document.querySelectorAll('#people .person[data-block="adult"]').forEach((row,i)=>{
    adults[i].name=row.querySelector('.p-name').value.trim();
  });
  document.querySelectorAll('#people .person[data-block="kid"]').forEach((row,i)=>{
    kids[i].name=row.querySelector('.p-name').value.trim();
  });

  // ordered list: adults then kids
  const people = [
    ...adults.map(a=>({name:a.name, type:"Erwachsener", meal:a.meal})),
    ...kids.map(k=>({name:k.name, type:"Kind", meal:k.meal}))
  ];

  for(let i=0;i<people.length;i++){
    if(!people[i].name){
      const lbl = people[i].type==="Erwachsener" ? "Erwachsenen" : "Kindes";
      showErr(`Bitte den Namen des ${i+1}. ${lbl} eintragen.`); return;
    }
  }

  const payload={
    mode: mode,
    contact: document.getElementById('contact').value.trim(),
    people: people
  };

  btn.disabled=true; btn.textContent='Wird gesendet…';

  let teams;
  try{
    if(DEMO){
      let b=counts.blue, y=counts.yellow;
      if(mode==='together'){
        const t=b<=y?'blue':'yellow';
        teams=people.map(()=>t);
        if(t==='blue') counts.blue+=people.length; else counts.yellow+=people.length;
      }else{
        teams=people.map(()=>{
          const t=b<=y?'blue':'yellow';
          if(t==='blue'){b++;counts.blue++;}else{y++;counts.yellow++;}
          return t;
        });
      }
      localStorage.setItem('tcf_counts', JSON.stringify(counts));
    }else{
      const r=await fetch(API_URL,{
        method:'POST',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify(payload)
      });
      const d=await r.json();
      if(!d.ok) throw new Error(d.error||'Serverfehler');
      teams=d.teams.map(t=>t.toLowerCase());
      counts={blue:d.blue, yellow:d.yellow};
    }
  }catch(err){
    btn.disabled=false; btn.textContent='Jetzt anmelden';
    showErr('Anmeldung fehlgeschlagen. Bitte erneut versuchen oder am Clubhaus eintragen.');
    return;
  }

  renderCounts();
  showDone(people, teams);
});

function showDone(people, teams){
  form.style.display='none';
  document.querySelector('.foot').style.display='none';
  const d=document.getElementById('doneScreen');
  const allSame = teams.every(t=>t===teams[0]);
  const teamCls = allSame ? teams[0] : 'mixed';
  d.classList.add('show', teamCls);
  document.getElementById('doneRing').textContent='✓';

  const list = people.map((p,i)=>{
    const tn = teams[i]==='blue' ? 'Blue' : 'Yellow';
    return `<div class="dperson"><span>${escapeHtml(p.name)}</span><span class="dteam ${teams[i]}">${tn}</span></div>`;
  }).join("");
  document.getElementById('doneTeam').innerHTML = list;
  document.getElementById('doneMsg').textContent =
    allSame ? 'Eure Armbänder bekommt ihr beim Einlass. Bis zum 25. Juli!'
            : 'Überraschung – ihr seid zufällig verteilt! Die Armbänder gibt es beim Einlass. Bis zum 25. Juli!';
}

function escapeHtml(s){return s.replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}

document.getElementById('againBtn').addEventListener('click',()=>{
  form.reset();
  counts_ppl.adults=1; counts_ppl.kids=0;
  adults.length=0; kids.length=0;
  document.getElementById('adults').textContent='1';
  document.getElementById('kids').textContent='0';
  mode='together';
  document.querySelectorAll('.mode').forEach(m=>m.classList.toggle('active', m.dataset.mode==='together'));
  renderPeople();
  document.getElementById('doneScreen').className='done';
  form.style.display='block';
  document.querySelector('.foot').style.display='block';
  btn.disabled=false; btn.textContent='Jetzt anmelden';
  window.scrollTo({top:0,behavior:'smooth'});
});
</script>
</body>
</html>
