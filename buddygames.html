<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TCF Summer Serve · Buddy & Spiele</title>
<style>
  :root{--navy:#0a2a5e;--navy-deep:#061a3d;--yellow:#ffc20e;--yellow-soft:#ffd757;--blue-team:#1c7bd6;--yellow-d:#e0a800;--line:rgba(255,255,255,.14)}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:'Trebuchet MS','Segoe UI',system-ui,sans-serif;background:var(--navy-deep);color:#fff;line-height:1.5}
  .wrap{max-width:920px;margin:0 auto;min-height:100vh;
    background:radial-gradient(120% 60% at 85% -10%,rgba(255,194,14,.14),transparent 55%),linear-gradient(180deg,var(--navy),var(--navy-deep))}
  .top{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:2px solid var(--yellow);position:sticky;top:0;z-index:20;
    background:var(--navy-deep)}
  .top .emblem{width:38px;height:38px;flex:0 0 38px}
  .top h1{font-size:14px;font-weight:800;letter-spacing:1px;line-height:1.1}
  .top h1 span{color:var(--yellow)}
  .top .sub{font-size:10px;color:rgba(255,255,255,.6)}

  /* big team total */
  .totalbar{display:flex;align-items:stretch;gap:0;margin:14px 16px 6px;border-radius:16px;overflow:hidden;
    box-shadow:0 8px 26px rgba(0,0,0,.35)}
  .tt{flex:1;padding:14px 16px;display:flex;flex-direction:column;align-items:center;position:relative}
  .tt.blue{background:linear-gradient(160deg,#1c7bd6,#0e4f93)}
  .tt.yellow{background:linear-gradient(160deg,#ffce3a,#f0a800);color:var(--navy-deep)}
  .tt .t{font-size:12px;font-weight:800;letter-spacing:1px;opacity:.92}
  .tt .v{font-size:40px;font-weight:900;line-height:1}
  .tt .lead{font-size:10px;font-weight:800;min-height:13px;letter-spacing:.5px}
  .vsband{display:flex;align-items:center;justify-content:center;background:var(--navy-deep);padding:0 12px;font-weight:900;font-size:13px;color:var(--yellow)}

  .toolbar{display:flex;gap:8px;padding:8px 16px 14px}
  .btn{border:none;border-radius:11px;font-weight:800;font-family:inherit;cursor:pointer;font-size:14px;padding:12px 16px}
  .btn.primary{background:var(--yellow);color:var(--navy-deep);flex:1}
  .btn.ghost{background:rgba(255,255,255,.07);color:#fff;border:1.5px solid var(--line)}
  .btn:active{transform:translateY(1px)}

  /* board */
  .boardwrap{padding:0 8px 30px}
  .board{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:14px}
  table{border-collapse:separate;border-spacing:0;width:100%;min-width:520px}
  thead th{font-size:11px;letter-spacing:.5px;color:rgba(255,255,255,.55);font-weight:800;text-transform:uppercase;
    padding:10px 10px;text-align:center;white-space:nowrap;position:sticky;top:0}
  th.pairhead,td.paircell{position:sticky;left:0;z-index:5;background:var(--navy);text-align:left;min-width:168px}
  thead th.pairhead{z-index:6}
  tbody td{padding:8px 8px;text-align:center;border-top:1px solid rgba(255,255,255,.06);vertical-align:middle}
  .paircell{padding:11px 12px !important}
  .pairnames{display:flex;flex-direction:column;gap:3px}
  .pn{font-weight:800;font-size:14px;display:flex;align-items:center;gap:7px}
  .pdot{width:10px;height:10px;border-radius:50%;flex:0 0 10px}
  .pdot.Blue{background:var(--blue-team)}.pdot.Yellow{background:var(--yellow)}
  .pvs{font-size:10px;color:rgba(255,255,255,.4);letter-spacing:1px;margin:1px 0 1px 17px}

  .gcell{min-width:96px}
  .gchip{display:inline-flex;flex-direction:column;align-items:center;gap:2px;cursor:pointer;
    background:rgba(255,255,255,.05);border:1.5px solid var(--line);border-radius:10px;padding:6px 8px;min-width:84px}
  .gchip .gn{font-size:9px;color:rgba(255,255,255,.5);letter-spacing:.3px;text-transform:uppercase;white-space:nowrap;max-width:80px;overflow:hidden;text-overflow:ellipsis}
  .gchip .gw{font-size:13px;font-weight:900;display:flex;align-items:center;gap:5px}
  .gchip .gw .wd{width:8px;height:8px;border-radius:50%}
  .gchip.Blue .gw{color:#7db9ee}.gchip.Yellow .gw{color:var(--yellow)}
  .gchip.Blue .wd{background:var(--blue-team)}.gchip.Yellow .wd{background:var(--yellow)}

  .addcell .addgame{width:40px;height:40px;border-radius:50%;border:2px dashed var(--line);background:rgba(255,255,255,.04);
    color:var(--yellow);font-size:22px;font-weight:900;cursor:pointer;line-height:1}
  .addcell .addgame:active{background:rgba(255,194,14,.15)}
  .addcell .gfull{font-size:11px;font-weight:800;color:#6fe09a;white-space:nowrap}
  .gcell .addgame{border:2px dashed var(--line);background:rgba(255,255,255,.04);color:var(--yellow);
    font-size:13px;font-weight:800;border-radius:10px;padding:11px 12px;cursor:pointer;white-space:nowrap;font-family:inherit}
  .gcell .addgame:active{background:rgba(255,194,14,.15)}
  .gchip.locked{cursor:default;opacity:.92}
  .actioncell{min-width:118px}
  .endbtn{background:rgba(255,255,255,.07);border:1.5px solid var(--line);color:var(--yellow-soft);
    font-weight:800;font-size:12px;border-radius:10px;padding:9px 12px;cursor:pointer;font-family:inherit;white-space:nowrap}
  .endbtn:active{background:rgba(255,194,14,.15)}
  .donetag{font-size:11px;font-weight:800;color:rgba(255,255,255,.4);letter-spacing:.5px}
  .editbtn{background:transparent;border:1.5px solid var(--line);color:rgba(255,255,255,.7);
    font-weight:800;font-size:12px;border-radius:10px;padding:9px 12px;cursor:pointer;font-family:inherit;white-space:nowrap}
  .editbtn:active{background:rgba(255,255,255,.1)}
  tr.finished{opacity:.6}
  tr.finished td.paircell{background:var(--navy-deep)}

  .strikecell{min-width:78px}
  .strikes{display:inline-flex;gap:6px;align-items:center;font-weight:900;font-size:13px}
  .sb{color:#7db9ee}.sy{color:var(--yellow)}

  .emptyboard{text-align:center;color:rgba(255,255,255,.45);font-size:14px;padding:46px 20px;line-height:1.6}

  /* ===== overlay shared ===== */
  .overlay{position:fixed;inset:0;background:rgba(4,12,30,.97);display:none;flex-direction:column;align-items:center;justify-content:center;padding:22px;z-index:50}
  .overlay.show{display:flex}

  /* draw reel */
  .who{font-size:13px;color:rgba(255,255,255,.7);margin-bottom:3px}.who b{color:#fff;font-size:19px}
  .vsmini{font-size:12px;letter-spacing:3px;color:var(--yellow-soft);font-weight:800;margin-bottom:14px}
  .reelbox{position:relative;width:300px;max-width:86vw;height:118px;overflow:hidden;border-radius:16px;border:3px solid var(--yellow);
    box-shadow:0 0 0 5px rgba(255,194,14,.18),0 16px 44px rgba(0,0,0,.5);background:#fff}
  .reel{position:absolute;left:0;right:0;top:0;display:flex;flex-direction:column;will-change:transform}
  .reel .item{height:118px;display:flex;align-items:center;justify-content:center;font-size:29px;font-weight:900;text-align:center;padding:0 14px}
  .reel .item.Blue{color:var(--blue-team)}.reel .item.Yellow{color:var(--yellow-d)}
  .reelmask{position:absolute;inset:0;pointer-events:none;z-index:2;background:linear-gradient(180deg,rgba(255,255,255,.92),transparent 24%,transparent 76%,rgba(255,255,255,.92))}
  .reelline{position:absolute;left:0;right:0;top:50%;height:3px;background:var(--yellow);opacity:.5;z-index:3}
  .spinhint{color:var(--yellow-soft);font-size:13px;font-weight:700;margin:13px 0 2px;min-height:18px}
  .reveal{text-align:center;display:none}.reveal.show{display:block;animation:pop .45s cubic-bezier(.2,1.3,.4,1)}
  @keyframes pop{from{opacity:0;transform:scale(.85)}to{opacity:1;transform:scale(1)}}
  .reveal .me{font-size:18px;font-weight:800}
  .reveal .vs{font-size:12px;letter-spacing:3px;color:rgba(255,255,255,.6);font-weight:800;margin:6px 0}
  .reveal .opp{font-size:36px;font-weight:900;line-height:1.05}
  .reveal .opp.Blue{color:var(--blue-team)}.reveal .opp.Yellow{color:var(--yellow)}
  .reveal .tag{font-size:12px;color:rgba(255,255,255,.7);margin-top:11px;max-width:300px}
  .ovbtns{display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;justify-content:center}
  .ovbtn{padding:13px 22px;border-radius:12px;border:none;font-weight:800;font-size:15px;cursor:pointer;font-family:inherit}
  .ovbtn.primary{background:var(--yellow);color:var(--navy-deep)}
  .ovbtn.ghost{background:transparent;border:1.5px solid var(--line);color:#fff}
  .confetti{position:fixed;width:10px;height:14px;z-index:60;pointer-events:none;top:-20px}

  /* sheet (add game / pick winner / search) */
  .sheet{position:fixed;left:0;right:0;bottom:0;background:#0c2350;border-top:2px solid var(--yellow);
    border-radius:20px 20px 0 0;padding:18px 18px 26px;z-index:55;transform:translateY(110%);transition:transform .28s;max-width:920px;margin:0 auto}
  .sheet.show{transform:translateY(0)}
  .sheet h3{font-size:15px;margin-bottom:14px;text-align:center}
  .sheet label{font-size:12px;font-weight:700;color:rgba(255,255,255,.8);display:block;margin-bottom:6px}
  .sheet select,.sheet input{width:100%;padding:12px 14px;border-radius:11px;border:1.5px solid var(--line);
    background:rgba(255,255,255,.06);color:#fff;font-size:16px;font-family:inherit;margin-bottom:12px}
  .sheet select:focus,.sheet input:focus{outline:none;border-color:var(--yellow)}
  .sheet select option{background:#0c2350}
  .winbtns{display:flex;gap:10px;margin-top:4px}
  .winbtn{flex:1;padding:15px 10px;border-radius:13px;border:none;font-weight:900;font-size:15px;cursor:pointer;font-family:inherit;line-height:1.2}
  .winbtn.Blue{background:var(--blue-team);color:#fff}
  .winbtn.Yellow{background:var(--yellow);color:var(--navy-deep)}
  .sheetclose{position:absolute;top:14px;right:16px;background:none;border:none;color:rgba(255,255,255,.6);font-size:22px;cursor:pointer}
  .scrim{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:54;display:none}
  .scrim.show{display:block}
  .searchlist{max-height:50vh;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
  .srow{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.06);border:1.5px solid var(--line);
    border-radius:11px;padding:12px 14px;cursor:pointer}
  .srow .nm{font-weight:700;display:flex;align-items:center;gap:8px}
  .srow.taken{opacity:.4}
  .modetag{font-size:11px;color:var(--yellow-soft);font-weight:800}
</style>
</head>

    <div><h1>SUMMER <span>SERVE</span></h1><div class="sub">Buddy & Mini-Spiele</div></div>
  </div>

  <div class="totalbar">
    <div class="tt blue"><div class="t">TEAM BLUE</div><div class="v" id="tBlue">0</div><div class="lead" id="lBlue"></div></div>
    <div class="vsband">VS</div>
    <div class="tt yellow"><div class="t">TEAM YELLOW</div><div class="v" id="tYellow">0</div><div class="lead" id="lYellow"></div></div>
  </div>

  <div class="toolbar">
    <button class="btn primary" id="drawBtn">🎡 Neue Auslosung</button>
  </div>

  <div class="boardwrap">
    <div class="board">
      <table id="boardTable">
        <thead><tr id="headRow"><th class="pairhead">Paarung</th><th>Striche</th></tr></thead>
        <tbody id="boardBody"></tbody>
      </table>
    </div>
    <div class="emptyboard" id="emptyBoard">Lade Daten…</div>
  </div>
</div>

<!-- DRAW OVERLAY -->
<div class="overlay" id="overlay">
  <div id="drawStage">
    <div class="who" id="who" style="text-align:center"></div>
    <div class="vsmini" style="text-align:center">SUCHT EINEN GEGNER…</div>
    <div class="reelbox" id="reelbox"><div class="reel" id="reel"></div><div class="reelmask"></div><div class="reelline"></div></div>
    <div class="spinhint" id="spinhint" style="text-align:center">&nbsp;</div>
    <div class="reveal" id="reveal">
      <div class="me" id="rMe"></div><div class="vs">SPIELT GEGEN</div><div class="opp" id="rOpp"></div>
      <div class="tag">Spielt die Mini-Spiele gegeneinander · jeder Sieg = 1 Strich fürs Team</div>
    </div>
    <div class="ovbtns" id="ovbtns" style="display:none"></div>
  </div>
</div>

<!-- SCRIM + SHEET -->
<div class="scrim" id="scrim"></div>
<div class="sheet" id="sheet">
  <button class="sheetclose" id="sheetClose">×</button>
  <div id="sheetBody"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbydmpSMC-9Hxf5gRUD7mnK-NabsLOWr0vhN3se3XrWvBELaQaoQ87Rdjova7eYqvnpa/exec";
let PEOPLE = [];        // from Teilnehmer
let PRESETS = [];       // game list from Konfig
let MAX_GAMES = 3;      // from Konfig B1
const $=id=>document.getElementById(id);
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const oppTeamOf=t=>t==='Blue'?'Yellow':'Blue';

// STATE
let pairs=[];      // {id, a, b, games:[{name,winner,winnerTeam}], active}

// a person is BUSY only if they're in an ACTIVE match
function busyNames(){
  const s=new Set();
  pairs.forEach(p=>{ if(p.active){ s.add(p.a.name); s.add(p.b.name); } });
  return s;
}

/* ===== totals ===== */
function totals(){
  let b=0, y=0;
  pairs.forEach(p=>p.games.forEach(g=>{ if(g.winnerTeam==='Blue')b++; else if(g.winnerTeam==='Yellow')y++; }));
  return {b,y};
}
function renderTotals(){
  const t=totals(); $('tBlue').textContent=t.b; $('tYellow').textContent=t.y;
  $('lBlue').textContent = t.b>t.y?'● führt':''; $('lYellow').textContent = t.y>t.b?'● führt':'';
  if(t.b===t.y && (t.b||t.y)){ $('lBlue').textContent='Gleichstand'; }
}

/* ===== board ===== */
function maxGames(){
  let m=0;
  pairs.forEach(p=>{
    let need=p.games.length;
    if(p.active && p.games.length<MAX_GAMES) need=p.games.length+1; // room for + Spiel
    m=Math.max(m,need);
  });
  return Math.min(MAX_GAMES, m);
}
function renderBoard(){
  renderTotals();
  if(!pairs.length){ $('emptyBoard').innerHTML='Noch keine Paarungen.<br>Tippe „🎡 Neue Auslosung" um zu starten.'; }
  $('emptyBoard').style.display = pairs.length?'none':'block';
  $('boardTable').style.display = pairs.length?'table':'none';
  const mg=Math.max(1,maxGames());
  // sort: active matches first, then finished (most recent first within each)
  const ordered = pairs.slice().sort((a,b)=>{
    if(a.active!==b.active) return a.active?-1:1;
    return 0;
  });
  // header
  let head='<th class="pairhead">Paarung</th>';
  for(let i=0;i<mg;i++) head+=`<th>Spiel ${i+1}</th>`;
  head+='<th>Striche</th><th>Aktion</th>';
  $('headRow').innerHTML=head;
  // body
  $('boardBody').innerHTML=ordered.map(p=>{
    let cells='';
    for(let i=0;i<mg;i++){
      const g=p.games[i];
      if(g){
        cells+=`<td class="gcell"><div class="gchip ${g.winnerTeam}" data-pair="${p.id}" data-game="${i}">
          <span class="gn">${esc(g.name)}</span>
          <span class="gw"><span class="wd"></span>${esc(g.winner)}</span></div></td>`;
      } else if(p.active && p.games.length<MAX_GAMES && i===p.games.length){
        cells+=`<td class="gcell"><button class="addgame" data-add="${p.id}">+ Spiel</button></td>`;
      } else cells+='<td class="gcell"></td>';
    }
    const sb=p.games.filter(g=>g.winnerTeam==='Blue').length;
    const sy=p.games.filter(g=>g.winnerTeam==='Yellow').length;
    let action = p.active
      ? `<button class="endbtn" data-end="${p.id}">Spiel beendet</button>`
      : `<button class="editbtn" data-edit="${p.id}">Bearbeiten</button>`;
    return `<tr class="${p.active?'':'finished'}">
      <td class="paircell"><div class="pairnames">
        <span class="pn"><span class="pdot ${p.a.team}"></span>${esc(p.a.name)}</span>
        <span class="pvs">gegen</span>
        <span class="pn"><span class="pdot ${p.b.team}"></span>${esc(p.b.name)}</span>
      </div></td>
      ${cells}
      <td class="strikecell"><span class="strikes"><span class="sb">${sb}</span>·<span class="sy">${sy}</span></span></td>
      <td class="actioncell">${action}</td>
    </tr>`;
  }).join('');
  // wire
  document.querySelectorAll('.addgame').forEach(b=>b.addEventListener('click',()=>openAddGame(b.dataset.add)));
  document.querySelectorAll('.gchip').forEach(c=>{ if(c.dataset.pair) c.addEventListener('click',()=>openEditGame(c.dataset.pair,+c.dataset.game)); });
  document.querySelectorAll('.endbtn').forEach(b=>b.addEventListener('click',()=>endMatch(b.dataset.end)));
  document.querySelectorAll('.editbtn').forEach(b=>b.addEventListener('click',()=>openMatchEdit(b.dataset.edit)));
}

function endMatch(pairId){
  const p=pairs.find(x=>x.id===pairId); if(!p)return;
  if(p.games.length===0){
    if(!confirm('Noch kein Spiel erfasst. Paarung verwerfen?')){ return; }
    pairs=pairs.filter(x=>x.id!==pairId);
    renderBoard();
    api({action:'matchClose', matchId:pairId, discard:true});
  } else {
    p.active=false;
    renderBoard();
    api({action:'matchClose', matchId:pairId});
  }
}

/* ===== draw ===== */
let cur={name:'',team:'',opp:'',oppTeam:''};
function openDrawSearch(){
  const busy=busyNames();
  showSheet(`<h3>Wen auslosen?</h3>
    <input id="dsearch" placeholder="Spieler suchen…" autocomplete="off">
    <div class="searchlist" id="dlist"></div>`);
  const render=()=>{
    const q=($('dsearch').value||'').trim().toLowerCase();
    let list=PEOPLE.slice().sort((a,b)=>a.name.localeCompare(b.name,'de'));
    if(q) list=list.filter(p=>p.name.toLowerCase().includes(q));
    $('dlist').innerHTML=list.map(p=>{
      const taken=busy.has(p.name);
      return `<div class="srow ${taken?'taken':''}" data-name="${esc(p.name)}" data-team="${p.team}">
        <span class="nm"><span class="pdot ${p.team}"></span>${esc(p.name)}</span>
        ${taken?'<span class="modetag">spielt gerade</span>':'<span class="modetag">AUSLOSEN ›</span>'}</div>`;
    }).join('');
    $('dlist').querySelectorAll('.srow').forEach(r=>{
      if(busy.has(r.dataset.name)) return;
      r.addEventListener('click',()=>{ hideSheet(); startDraw(r.dataset.name,r.dataset.team); });
    });
  };
  $('dsearch').addEventListener('input',render); render();
  setTimeout(()=>$('dsearch').focus(),200);
}
function availableOpp(team){ const busy=busyNames(); return PEOPLE.filter(p=>p.team===oppTeamOf(team) && !busy.has(p.name)); }
function startDraw(name,team){
  const pool=availableOpp(team);
  if(!pool.length){ toastSheet('Kein freier Gegner mehr im Team '+(oppTeamOf(team)==='Blue'?'Blau':'Gelb')); return; }
  const opp=pool[Math.floor(Math.random()*pool.length)].name;
  cur={name,team,opp,oppTeam:oppTeamOf(team)};
  openSpin(name,opp,cur.oppTeam,pool);
}
function buildReel(pool,finalName){
  const reel=$('reel'); reel.style.transition='none'; reel.style.transform='translateY(0)';
  const names=[]; const N=32;
  for(let i=0;i<N;i++) names.push(pool[Math.floor(Math.random()*pool.length)].name);
  names.push(finalName);
  reel.innerHTML=names.map(n=>`<div class="item ${cur.oppTeam}">${esc(n)}</div>`).join('');
  return N;
}
function openSpin(name,opp,oppTeam,pool){
  $('overlay').classList.add('show');
  $('reveal').classList.remove('show'); $('ovbtns').style.display='none'; $('reelbox').style.display='block';
  document.querySelector('.vsmini').style.display='block';
  $('who').innerHTML=`<b>${esc(name)}</b>`; $('spinhint').innerHTML='&nbsp;';
  document.querySelector('.vsmini').textContent='SUCHT EINEN GEGNER…';
  const fi=buildReel(pool,opp); const reel=$('reel'); const target=fi*118;
  void reel.offsetWidth;
  reel.style.transition='transform 3.3s cubic-bezier(.12,.66,.13,1)';
  reel.style.transform=`translateY(${-target}px)`;
  setTimeout(()=>landReveal(name,opp,oppTeam),3450);
}
function landReveal(name,opp,oppTeam){
  $('reelbox').style.display='none'; document.querySelector('.vsmini').style.display='none';
  $('spinhint').textContent='Gegner gefunden!';
  $('rMe').textContent=name; const o=$('rOpp'); o.textContent=opp; o.className='opp '+oppTeam;
  $('reveal').classList.add('show'); burst(oppTeam);
  const box=$('ovbtns'); box.style.display='flex';
  box.innerHTML='<button class="ovbtn ghost" id="again">Nochmal drehen</button><button class="ovbtn primary" id="accept">Passt! ✓</button>';
  $('again').addEventListener('click',()=>{ const pool=availableOpp(cur.team);
    let o2=cur.opp; if(pool.length>1){ while(o2===cur.opp) o2=pool[Math.floor(Math.random()*pool.length)].name; }
    cur.opp=o2; openSpin(cur.name,o2,cur.oppTeam,pool); });
  $('accept').addEventListener('click',acceptPair);
}
async function acceptPair(){
  const a={name:cur.name,team:cur.team}, b={name:cur.opp,team:cur.oppTeam};
  $('overlay').classList.remove('show');
  // optimistic local row with temp id
  const tempId='tmp'+Date.now();
  const pair={id:tempId,a,b,games:[],active:true,pending:true};
  pairs.push(pair); renderBoard();
  // create on backend, adopt real MatchID
  const d=await api({action:'matchCreate', a:a, b:b});
  if(d && d.ok){ pair.id=d.id; pair.pending=false; renderBoard(); }
  else {
    // failed -> remove optimistic row
    pairs=pairs.filter(x=>x.id!==tempId); renderBoard();
    toast('Konnte Match nicht speichern: '+((d&&d.error)||'Fehler'));
  }
}
$('overlay').addEventListener('click',e=>{ if(e.target===$('overlay')) $('overlay').classList.remove('show'); });

/* ===== add / edit game ===== */
let sheetCtx=null;
function gameSheetHTML(pair,title,selected,excludeNames){
  const used=new Set(excludeNames||[]);
  const opts=PRESETS.filter(g=>!used.has(g)||g===selected)
    .map(g=>`<option value="${esc(g)}" ${g===selected?'selected':''}>${esc(g)}</option>`).join('');
  return `<h3>${title}</h3>
    <label>Spiel</label>
    <select id="gameSel"><option value="">– Spiel wählen –</option>${opts}</select>
    <label>Wer hat gewonnen?</label>
    <div class="winbtns">
      <button class="winbtn ${pair.a.team}" data-w="a">${esc(pair.a.name)}</button>
      <button class="winbtn ${pair.b.team}" data-w="b">${esc(pair.b.name)}</button>
    </div>`;
}
function openMatchEdit(pairId){
  const p=pairs.find(x=>x.id===pairId); if(!p)return;
  // finished-match editor: list games (tap to change/delete) + add if under 3
  let rows=p.games.map((g,i)=>`<div class="srow" data-gi="${i}">
      <span class="nm"><span class="pdot ${g.winnerTeam}"></span>${esc(g.name)} – ${esc(g.winner)}</span>
      <span class="modetag">ÄNDERN ›</span></div>`).join('');
  let addBtn = p.games.length<MAX_GAMES
    ? `<button class="ovbtn primary" id="meAdd" style="width:100%;margin-top:12px">+ Spiel hinzufügen</button>` : '';
  showSheet(`<h3>${esc(p.a.name)} gegen ${esc(p.b.name)}</h3>
    <div class="searchlist">${rows||'<div style="text-align:center;color:rgba(255,255,255,.5);padding:12px">Keine Spiele.</div>'}</div>
    ${addBtn}`);
  document.querySelectorAll('#sheetBody .srow').forEach(r=>r.addEventListener('click',()=>{ hideSheet(); setTimeout(()=>openEditGame(pairId,+r.dataset.gi),60); }));
  if(p.games.length<MAX_GAMES) $('meAdd').addEventListener('click',()=>{ hideSheet(); setTimeout(()=>openAddGame(pairId),60); });
}

function openAddGame(pairId){
  const p=pairs.find(x=>x.id===pairId); if(!p)return;
  if(p.games.length>=MAX_GAMES) return;
  if(p.pending){ toast('Match wird noch gespeichert…'); return; }
  sheetCtx={mode:'add',pairId};
  const played=p.games.map(g=>g.name);
  showSheet(gameSheetHTML(p,'Neues Spiel','',played));
  wireGameSheet(p);
}
function openEditGame(pairId,gi){
  const p=pairs.find(x=>x.id===pairId); if(!p)return; const g=p.games[gi]; if(!g)return;
  sheetCtx={mode:'edit',pairId,gi};
  // exclude other games already played in this match (but keep current selectable)
  const played=p.games.filter((_,i)=>i!==gi).map(x=>x.name);
  let html=gameSheetHTML(p,'Spiel ändern', g.name, played);
  html+=`<button class="ovbtn ghost" id="delGame" style="width:100%;margin-top:14px">Spiel löschen</button>`;
  showSheet(html);
  wireGameSheet(p);
  $('delGame').addEventListener('click',()=>{
    const old=p.games[gi];
    p.games.splice(gi,1);
    hideSheet(); renderBoard();
    if(old) api({action:'matchGame', matchId:pairId, game:old.name, winner:''}); // clear column
  });
}
function wireGameSheet(p){
  const sel=$('gameSel');
  document.querySelectorAll('.winbtn').forEach(btn=>btn.addEventListener('click',()=>{
    const gname = sel.value||'';
    if(!gname){ toastSheet('Bitte ein Spiel wählen.'); return; }
    const who = btn.dataset.w==='a'?p.a:p.b;
    const entry={name:gname,winner:who.name,winnerTeam:who.team};
    let clearedOld=null;
    if(sheetCtx.mode==='add') p.games.push(entry);
    else {
      const prev=p.games[sheetCtx.gi];
      if(prev && prev.name!==gname) clearedOld=prev.name; // game changed -> clear old column
      p.games[sheetCtx.gi]=entry;
    }
    if(p.games.length>=MAX_GAMES) p.active=false; // auto-close
    hideSheet(); renderBoard();
    // persist: if a different game name replaced an old one, clear the old column first
    if(clearedOld) api({action:'matchGame', matchId:p.id, game:clearedOld, winner:''});
    api({action:'matchGame', matchId:p.id, game:gname, winner:who.name});
  }));
}

/* ===== sheet plumbing ===== */
function showSheet(html){ $('sheetBody').innerHTML=html; $('sheet').classList.add('show'); $('scrim').classList.add('show'); }
function hideSheet(){ $('sheet').classList.remove('show'); $('scrim').classList.remove('show'); }
function toastSheet(msg){ const h=$('sheetBody'); const d=document.createElement('div'); d.style.cssText='margin-top:10px;color:var(--yellow-soft);font-weight:700;text-align:center;font-size:13px'; d.textContent=msg; h.appendChild(d); }
$('scrim').addEventListener('click',hideSheet);
$('sheetClose').addEventListener('click',hideSheet);

/* buttons */
$('drawBtn').addEventListener('click',openDrawSearch);

/* confetti */
function burst(team){
  const colors=team==='Blue'?['#1c7bd6','#fff','#ffc20e']:['#ffc20e','#fff','#1c7bd6'];
  for(let i=0;i<24;i++){ const c=document.createElement('div'); c.className='confetti';
    c.style.left=(50+(Math.random()*40-20))+'%'; c.style.background=colors[i%colors.length];
    document.body.appendChild(c);
    const dx=(Math.random()*2-1)*180, dy=window.innerHeight*0.7+Math.random()*120, rot=Math.random()*720;
    c.animate([{transform:'translate(0,0)',opacity:1},{transform:`translate(${dx}px,${dy}px) rotate(${rot}deg)`,opacity:0}],
      {duration:1100+Math.random()*700,easing:'cubic-bezier(.2,.6,.3,1)'}).onfinish=()=>c.remove();
  }
}

/* ===== backend ===== */
async function api(payload){
  try{
    const r=await fetch(API_URL,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(payload)});
    return await r.json();
  }catch(e){ toast('Verbindungsfehler'); return {ok:false,error:String(e)}; }
}

async function loadAll(){
  try{
    const r=await fetch(API_URL+'?action=gamesData');
    const d=await r.json();
    if(!d.ok) throw new Error(d.error||'Fehler');
    PEOPLE = d.people||[];
    PRESETS = d.games||[];
    MAX_GAMES = d.maxGames||3;
    // rebuild board from sheet matches
    pairs = (d.matches||[]).map(m=>({
      id: m.id,
      a: m.a, b: m.b,
      games: (m.games||[]).map(g=>({
        name: g.name, winner: g.winner,
        winnerTeam: (g.winner===m.a.name)?m.a.team : (g.winner===m.b.name)?m.b.team : ''
      })),
      active: (m.status!=='beendet')
    }));
    renderBoard();
  }catch(e){
    $('emptyBoard').innerHTML='Konnte Daten nicht laden.<br><small style="opacity:.6">'+esc(String(e))+'</small><br><button class="refreshb" id="retry">↻ Erneut</button>';
    $('emptyBoard').style.display='block';
    const rb=$('retry'); if(rb) rb.addEventListener('click',loadAll);
  }
}

/* init */
loadAll();
</script>
</body>
</html>
